name: Build y Release
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "presgen" bin/main.py

      - name: Verificar ejecutable # ← ahora DESPUÉS de compilar
        run: dir dist\

      - name: Obtener versión del commit
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.version.outputs.sha }}
          name: "Build ${{ steps.version.outputs.sha }}"
          files: dist/Presgen.exe
          body: |
            Version Compilada Automaticamente
            Commit: ${{ github.event.head_commit.message }}
            Fecha: ${{ github.run_id }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
